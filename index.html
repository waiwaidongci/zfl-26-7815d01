<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>夜间灯塔守望</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "PingFang SC", sans-serif; background: #08151c; color: #eef6f2; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 300px 1fr; }
    aside { padding: 20px; background: #10222b; border-right: 1px solid #24414b; }
    h1 { margin: 0 0 8px; font-size: 26px; }
    h2 { margin: 18px 0 8px; font-size: 17px; }
    p { color: #a8bbc0; line-height: 1.55; }
    button { width: 100%; border: 0; border-radius: 8px; padding: 11px 12px; margin: 6px 0; background: #e7c46a; color: #15212a; font-weight: 800; cursor: pointer; }
    button.secondary { background: #24414b; color: #eef6f2; }
    .stat { display: grid; grid-template-columns: 1fr auto; gap: 6px; padding: 8px 0; border-bottom: 1px solid #24414b; color: #c9d7d7; }
    .game { position: relative; display: grid; place-items: center; padding: 18px; }
    canvas { width: min(100%, 900px); max-height: calc(100vh - 36px); aspect-ratio: 16 / 10; border: 1px solid #315762; border-radius: 8px; background: #0a2735; }
    .overlay { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; }
    .panel { width: min(430px, calc(100% - 28px)); background: rgba(13, 29, 37, .94); border: 1px solid #385c65; border-radius: 8px; padding: 22px; pointer-events: auto; box-shadow: 0 18px 60px rgba(0,0,0,.35); }
    .hidden { display: none; }
    .keys { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .key { padding: 8px; background: #142f3a; border-radius: 6px; color: #c9d7d7; }
    .level-select { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 16px; }
    .level-card { background: #142f3a; border: 1px solid #24414b; border-radius: 8px; padding: 14px; cursor: pointer; transition: all .2s; }
    .level-card:hover:not(.locked) { border-color: #e7c46a; transform: translateY(-2px); }
    .level-card.locked { opacity: .45; cursor: not-allowed; }
    .level-card.active { border-color: #e7c46a; background: #1a3947; }
    .level-card h3 { margin: 0 0 8px; font-size: 16px; color: #eef6f2; }
    .level-card.locked h3 { color: #879aa0; }
    .level-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; font-size: 12px; color: #a8bbc0; }
    .level-stats b { color: #eef6f2; font-weight: 600; }
    .level-best { margin-top: 8px; padding-top: 8px; border-top: 1px solid #24414b; font-size: 13px; color: #e7c46a; }
    .level-best .no-record { color: #6b8086; }
    .lock-icon { float: right; font-size: 14px; }
    .back-btn { margin-top: 12px; }
    .settings-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #24414b; }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 14px; color: #c9d7d7; }
    .settings-value { font-size: 13px; color: #e7c46a; min-width: 32px; text-align: right; }
    input[type="range"] { width: 100%; accent-color: #e7c46a; margin-top: 4px; }
    .toggle { position: relative; width: 44px; height: 24px; background: #24414b; border-radius: 12px; cursor: pointer; transition: background .2s; }
    .toggle.on { background: #e7c46a; }
    .toggle::after { content: ""; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #eef6f2; border-radius: 50%; transition: transform .2s; }
    .toggle.on::after { transform: translateX(20px); }
    .pause-hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(13,29,37,.75); color: #a8bbc0; font-size: 13px; padding: 6px 16px; border-radius: 6px; pointer-events: none; }
    .game-settings-btn { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border: 0; border-radius: 50%; background: rgba(13,29,37,.75); color: #eef6f2; font-size: 18px; cursor: pointer; display: grid; place-items: center; transition: background .2s; z-index: 5; }
    .game-settings-btn:hover { background: rgba(13,29,37,.9); }
    .settings-panel-modal { width: min(380px, calc(100% - 28px)); }
    .settings-panel-modal h2 { margin: 0 0 14px; font-size: 20px; }
    .settings-panel-modal input[type="range"] { margin-bottom: 8px; }
    @media (max-width: 850px) { .app { grid-template-columns: 1fr; } aside { border-right: 0; border-bottom: 1px solid #24414b; } canvas { max-height: 62vh; } }
  </style>
</head>
<body>
  <div class="app">
    <aside id="sidebar">
      <div id="mainMenu">
        <h1>夜间灯塔守望</h1>
        <p>旋转灯塔光束，让小船在暗礁和雾区之间找到安全航道。船只离开光束太久会迷航，撞上暗礁则失败。</p>
        <button id="startBtn">开始第1关</button>
        <button id="levelSelectBtn" class="secondary">选择关卡</button>
        <button id="pauseBtn" class="secondary">暂停</button>
        <button id="settingsBtn" class="secondary">游戏设置</button>
        <h2>状态</h2>
        <div class="stat"><span>关卡</span><b id="levelText">1 / 3</b></div>
        <div class="stat"><span>得分</span><b id="scoreText">0</b></div>
        <div class="stat"><span>抵达</span><b id="arrivedText">0</b></div>
        <div class="stat"><span>最佳</span><b id="bestText">0</b></div>
        <h2>操作</h2>
        <div class="keys">
          <div class="key">← / → 旋转光束</div>
          <div class="key">空格 切换宽度</div>
          <div class="key">P 暂停</div>
          <div class="key">R 重开本关</div>
        </div>
      </div>
      <div id="settingsPanel" class="hidden">
        <h1>游戏设置</h1>
        <div class="settings-row">
          <span class="settings-label">音效</span>
          <div id="soundToggle" class="toggle on"></div>
        </div>
        <div class="settings-row">
          <span class="settings-label">画面亮度</span>
          <span id="brightnessValue" class="settings-value">100%</span>
        </div>
        <input type="range" id="brightnessRange" min="30" max="100" value="100">
        <div class="settings-row">
          <span class="settings-label">光束旋转灵敏度</span>
          <span id="sensitivityValue" class="settings-value">1.0x</span>
        </div>
        <input type="range" id="sensitivityRange" min="3" max="30" value="10">
        <div class="settings-row">
          <span class="settings-label">暂停键提示</span>
          <div id="pauseHintToggle" class="toggle on"></div>
        </div>
        <button id="backFromSettingsBtn" class="secondary back-btn">返回</button>
      </div>
      <div id="levelSelectPanel" class="hidden">
        <h1>选择关卡</h1>
        <p>从已解锁的关卡中选择，通关后自动解锁下一关。</p>
        <div id="levelCards" class="level-select"></div>
        <button id="backToMenuBtn" class="secondary back-btn">返回主菜单</button>
      </div>
    </aside>
    <main class="game">
      <canvas id="game" width="960" height="600"></canvas>
      <button class="game-settings-btn" id="gameSettingsBtn" title="游戏设置">⚙</button>
      <div class="pause-hint hidden" id="pauseHint">按 P 暂停游戏</div>
      <div class="overlay" id="overlay">
        <div class="panel">
          <h2 id="overlayTitle">夜间灯塔守望</h2>
          <p id="overlayText">照亮航道，护送全部船只抵达右侧港湾。</p>
          <button id="overlayBtn">开始游戏</button>
        </div>
      </div>
      <div class="overlay hidden" id="settingsOverlay">
        <div class="panel settings-panel-modal">
          <h2>游戏设置</h2>
          <div class="settings-row">
            <span class="settings-label">音效</span>
            <div id="modalSoundToggle" class="toggle on"></div>
          </div>
          <div class="settings-row">
            <span class="settings-label">画面亮度</span>
            <span id="modalBrightnessValue" class="settings-value">100%</span>
          </div>
          <input type="range" id="modalBrightnessRange" min="30" max="100" value="100">
          <div class="settings-row">
            <span class="settings-label">光束旋转灵敏度</span>
            <span id="modalSensitivityValue" class="settings-value">1.0x</span>
          </div>
          <input type="range" id="modalSensitivityRange" min="3" max="30" value="10">
          <div class="settings-row">
            <span class="settings-label">暂停键提示</span>
            <div id="modalPauseHintToggle" class="toggle on"></div>
          </div>
          <button id="closeSettingsBtn" class="secondary back-btn">关闭</button>
        </div>
      </div>
    </main>
  </div>
  <script>
    const SoundManager = {
      audioContext: null,
      enabled: true,
      initialized: false,

      init: function() {
        if (this.initialized) return;
        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (AudioContextClass) {
            this.audioContext = new AudioContextClass();
            this.initialized = true;
          }
        } catch (e) {
          this.initialized = false;
        }
      },

      unlock: function() {
        if (!this.audioContext) {
          this.init();
        }
        if (this.audioContext && this.audioContext.state === "suspended") {
          this.audioContext.resume().catch(function() {});
        }
      },

      setEnabled: function(enabled) {
        this.enabled = enabled;
      },

      playTone: function(frequency, duration, type, volume, startTimeOffset) {
        if (!this.enabled) return;
        this.init();
        if (!this.audioContext) return;
        try {
          const ctx = this.audioContext;
          const now = ctx.currentTime + (startTimeOffset || 0);
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = type || "sine";
          osc.frequency.setValueAtTime(frequency, now);
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(volume || 0.3, now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + duration + 0.02);
        } catch (e) {}
      },

      startGame: function() {
        this.playTone(440, 0.12, "sine", 0.25, 0);
        this.playTone(554, 0.12, "sine", 0.25, 0.1);
        this.playTone(659, 0.18, "sine", 0.3, 0.2);
      },

      toggleBeam: function() {
        this.playTone(880, 0.06, "square", 0.15, 0);
        this.playTone(1100, 0.05, "square", 0.12, 0.04);
      },

      boatArrived: function() {
        this.playTone(784, 0.08, "triangle", 0.25, 0);
        this.playTone(988, 0.08, "triangle", 0.25, 0.07);
        this.playTone(1175, 0.12, "triangle", 0.28, 0.14);
      },

      crash: function() {
        if (!this.enabled) return;
        this.init();
        if (!this.audioContext) return;
        try {
          const ctx = this.audioContext;
          const now = ctx.currentTime;
          const bufferSize = ctx.sampleRate * 0.4;
          const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
          }
          const noise = ctx.createBufferSource();
          noise.buffer = buffer;
          const filter = ctx.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(800, now);
          filter.frequency.exponentialRampToValueAtTime(120, now + 0.35);
          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0.5, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
          noise.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);
          noise.start(now);
          noise.stop(now + 0.4);
          this.playTone(110, 0.3, "sawtooth", 0.35, 0);
        } catch (e) {}
      },

      victory: function() {
        const notes = [523, 659, 784, 659, 784, 1047];
        notes.forEach(function(freq, i) {
          this.playTone(freq, 0.18, "triangle", 0.28, i * 0.12);
        }.bind(this));
      }
    };

    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const overlay = document.querySelector("#overlay");
    const overlayTitle = document.querySelector("#overlayTitle");
    const overlayText = document.querySelector("#overlayText");
    const overlayBtn = document.querySelector("#overlayBtn");
    const startBtn = document.querySelector("#startBtn");
    const pauseBtn = document.querySelector("#pauseBtn");
    const levelText = document.querySelector("#levelText");
    const scoreText = document.querySelector("#scoreText");
    const arrivedText = document.querySelector("#arrivedText");
    const bestText = document.querySelector("#bestText");
    const levelSelectBtn = document.querySelector("#levelSelectBtn");
    const backToMenuBtn = document.querySelector("#backToMenuBtn");
    const mainMenu = document.querySelector("#mainMenu");
    const levelSelectPanel = document.querySelector("#levelSelectPanel");
    const levelCards = document.querySelector("#levelCards");
    const settingsBtn = document.querySelector("#settingsBtn");
    const settingsPanel = document.querySelector("#settingsPanel");
    const backFromSettingsBtn = document.querySelector("#backFromSettingsBtn");
    const soundToggle = document.querySelector("#soundToggle");
    const brightnessRange = document.querySelector("#brightnessRange");
    const brightnessValue = document.querySelector("#brightnessValue");
    const sensitivityRange = document.querySelector("#sensitivityRange");
    const sensitivityValue = document.querySelector("#sensitivityValue");
    const pauseHintToggle = document.querySelector("#pauseHintToggle");
    const pauseHintEl = document.querySelector("#pauseHint");
    const gameSettingsBtn = document.querySelector("#gameSettingsBtn");
    const settingsOverlay = document.querySelector("#settingsOverlay");
    const closeSettingsBtn = document.querySelector("#closeSettingsBtn");
    const modalSoundToggle = document.querySelector("#modalSoundToggle");
    const modalBrightnessRange = document.querySelector("#modalBrightnessRange");
    const modalBrightnessValue = document.querySelector("#modalBrightnessValue");
    const modalSensitivityRange = document.querySelector("#modalSensitivityRange");
    const modalSensitivityValue = document.querySelector("#modalSensitivityValue");
    const modalPauseHintToggle = document.querySelector("#modalPauseHintToggle");

    const levels = [
      { name: "初夜启航", boats: 3, rocks: [{x:420,y:210,r:34},{x:610,y:390,r:30}], fog: [{x:560,y:250,r:90}] },
      { name: "迷雾渐浓", boats: 4, rocks: [{x:330,y:170,r:28},{x:520,y:320,r:36},{x:720,y:220,r:30}], fog: [{x:480,y:430,r:100},{x:680,y:160,r:75}] },
      { name: "风暴前夕", boats: 5, rocks: [{x:300,y:260,r:32},{x:480,y:160,r:30},{x:650,y:350,r:38},{x:790,y:250,r:25}], fog: [{x:430,y:420,r:95},{x:650,y:180,r:95},{x:760,y:430,r:70}] }
    ];
    let state = "menu";
    let level = 0;
    let score = 0;
    let levelScore = 0;
    let beamAngle = -0.15;
    let beamWide = false;
    let boats = [];
    let keys = {};
    let last = 0;
    const lighthouse = { x: 110, y: 300 };

    function loadProgress() {
      const unlocked = Number(localStorage.getItem("zfl26Unlocked") || 1);
      const best = Number(localStorage.getItem("zfl26Best") || 0);
      let levelBests = {};
      try {
        const stored = localStorage.getItem("zfl26LevelBests");
        if (stored) {
          levelBests = JSON.parse(stored);
        }
      } catch (e) {
        levelBests = {};
      }
      return { unlocked, best, levelBests };
    }

    function loadSettings() {
      try {
        const stored = localStorage.getItem("zfl26Settings");
        if (stored) return JSON.parse(stored);
      } catch (e) {}
      return { sound: true, brightness: 100, sensitivity: 1.0, pauseHint: true };
    }

    function saveSettings() {
      localStorage.setItem("zfl26Settings", JSON.stringify(gameSettings));
    }

    let gameSettings = loadSettings();

    function applySettings() {
      SoundManager.setEnabled(gameSettings.sound);
      soundToggle.className = "toggle" + (gameSettings.sound ? " on" : "");
      brightnessRange.value = gameSettings.brightness;
      brightnessValue.textContent = gameSettings.brightness + "%";
      sensitivityRange.value = Math.round(gameSettings.sensitivity * 10);
      sensitivityValue.textContent = gameSettings.sensitivity.toFixed(1) + "x";
      pauseHintToggle.className = "toggle" + (gameSettings.pauseHint ? " on" : "");
      modalSoundToggle.className = "toggle" + (gameSettings.sound ? " on" : "");
      modalBrightnessRange.value = gameSettings.brightness;
      modalBrightnessValue.textContent = gameSettings.brightness + "%";
      modalSensitivityRange.value = Math.round(gameSettings.sensitivity * 10);
      modalSensitivityValue.textContent = gameSettings.sensitivity.toFixed(1) + "x";
      modalPauseHintToggle.className = "toggle" + (gameSettings.pauseHint ? " on" : "");
      updatePauseHint();
      canvas.style.filter = "brightness(" + (gameSettings.brightness / 100) + ")";
    }

    function updatePauseHint() {
      pauseHintEl.classList.toggle("hidden", !gameSettings.pauseHint || state !== "playing");
    }

    function saveUnlocked(unlocked) {
      localStorage.setItem("zfl26Unlocked", unlocked);
    }

    function saveBest(best) {
      localStorage.setItem("zfl26Best", best);
    }

    function saveLevelBest(levelIndex, score) {
      const levelBests = JSON.parse(localStorage.getItem("zfl26LevelBests") || "{}");
      const current = Number(levelBests[levelIndex] || 0);
      if (score > current) {
        levelBests[levelIndex] = score;
        localStorage.setItem("zfl26LevelBests", JSON.stringify(levelBests));
        return score;
      }
      return current;
    }

    function updateGlobalBest() {
      const { best } = loadProgress();
      bestText.textContent = best;
    }

    function renderLevelCards() {
      const { unlocked, levelBests } = loadProgress();
      levelCards.innerHTML = "";
      levels.forEach(function(lvl, idx) {
        const isUnlocked = idx < unlocked;
        const levelBest = levelBests[idx] || 0;
        const card = document.createElement("div");
        card.className = "level-card" + (isUnlocked ? "" : " locked");
        let bestTextHtml = "";
        if (isUnlocked) {
          if (levelBest > 0) {
            bestTextHtml = "最佳：" + levelBest + " 分";
          } else {
            bestTextHtml = '<span class="no-record">尚未通关</span>';
          }
        } else {
          bestTextHtml = '<span class="no-record">通关前一关解锁</span>';
        }
        const lockIcon = isUnlocked ? "" : ' <span class="lock-icon">🔒</span>';
        card.innerHTML =
          '<h3>第' + (idx + 1) + '关：' + lvl.name + lockIcon + '</h3>' +
          '<div class="level-stats">' +
            '<span>船只</span><b>' + lvl.boats + ' 艘</b>' +
            '<span>暗礁</span><b>' + lvl.rocks.length + ' 个</b>' +
            '<span>雾区</span><b>' + lvl.fog.length + ' 个</b>' +
          '</div>' +
          '<div class="level-best">' + bestTextHtml + '</div>';
        if (isUnlocked) {
          card.onclick = function() { startFromLevel(idx); };
        }
        levelCards.appendChild(card);
      });
    }

    function showLevelSelect() {
      mainMenu.classList.add("hidden");
      settingsPanel.classList.add("hidden");
      levelSelectPanel.classList.remove("hidden");
      renderLevelCards();
      state = "levelSelect";
    }

    function showMainMenu() {
      mainMenu.classList.remove("hidden");
      levelSelectPanel.classList.add("hidden");
      settingsPanel.classList.add("hidden");
      state = "menu";
      show("夜间灯塔守望", "照亮航道，护送全部船只抵达右侧港湾。", "开始游戏", function() { level = 0; score = 0; resetLevel(); });
    }

    function showSettings() {
      mainMenu.classList.add("hidden");
      levelSelectPanel.classList.add("hidden");
      settingsPanel.classList.remove("hidden");
      applySettings();
    }

    function hideSettings() {
      settingsPanel.classList.add("hidden");
      mainMenu.classList.remove("hidden");
    }

    let prevState = "menu";
    function openGameSettings() {
      if (state === "playing" || state === "paused") {
        prevState = state;
        state = "paused";
        updatePauseHint();
      }
      applySettings();
      settingsOverlay.classList.remove("hidden");
    }

    function closeGameSettings() {
      settingsOverlay.classList.add("hidden");
      if (prevState === "playing") {
        state = "playing";
        updatePauseHint();
      }
    }

    function startFromLevel(levelIndex) {
      level = levelIndex;
      levelScore = 0;
      score = 0;
      showMainMenu();
      resetLevel();
    }

    function resetLevel() {
      applySettings();
      SoundManager.startGame();
      const data = levels[level];
      levelScore = score;
      boats = Array.from({ length: data.boats }, function(_, i) {
        return {
          x: 40 - i * 42,
          y: 130 + i * (330 / Math.max(1, data.boats - 1)),
          speed: 26 + level * 8 + i * 3,
          drift: (i % 2 ? 1 : -1) * (12 + level * 3),
          lit: 3.2,
          arrived: false,
          lost: false
        };
      });
      beamAngle = -0.1;
      beamWide = false;
      state = "playing";
      overlay.classList.add("hidden");
      updatePauseHint();
      updateHud();
    }

    function inBeam(boat) {
      const dx = boat.x - lighthouse.x;
      const dy = boat.y - lighthouse.y;
      const angle = Math.atan2(dy, dx);
      let diff = Math.atan2(Math.sin(angle - beamAngle), Math.cos(angle - beamAngle));
      const width = beamWide ? 0.42 : 0.22;
      return Math.abs(diff) < width && Math.hypot(dx, dy) < 760;
    }

    function hitRock(boat) {
      return levels[level].rocks.some(rock => Math.hypot(boat.x - rock.x, boat.y - rock.y) < rock.r + 9);
    }

    function update(dt) {
      if (state !== "playing") return;
      if (keys.ArrowLeft) beamAngle -= dt * 1.6 * gameSettings.sensitivity;
      if (keys.ArrowRight) beamAngle += dt * 1.6 * gameSettings.sensitivity;
      for (const boat of boats) {
        if (boat.arrived || boat.lost) continue;
        const lit = inBeam(boat);
        boat.lit += lit ? dt * 1.8 : -dt;
        boat.lit = Math.max(0, Math.min(4, boat.lit));
        boat.x += boat.speed * dt;
        boat.y += Math.sin(boat.x / 60) * boat.drift * dt + (lit ? 0 : boat.drift * dt * .6);
        if (boat.y < 55 || boat.y > 545 || boat.lit <= 0 || hitRock(boat)) {
          boat.lost = true;
          SoundManager.crash();
          end(false, "有船只迷航或触礁，守望失败。");
          return;
        }
        if (boat.x > 900) {
          boat.arrived = true;
          SoundManager.boatArrived();
          score += Math.round(100 + boat.lit * 20);
        }
      }
      if (boats.every(boat => boat.arrived)) {
        const currentLevelScore = score - levelScore;
        saveLevelBest(level, currentLevelScore);
        const { unlocked } = loadProgress();
        if (level + 1 >= unlocked && level < levels.length - 1) {
          saveUnlocked(level + 2);
        }
        const totalBest = Math.max(Number(localStorage.getItem("zfl26Best") || 0), score);
        saveBest(totalBest);
        updateGlobalBest();
        SoundManager.victory();
        if (level < levels.length - 1) {
          level += 1;
          show("第" + (level) + "关完成", "本关得分：" + currentLevelScore + "。港湾又亮起一盏灯。准备进入下一关。", "继续", resetLevel);
          state = "between";
        } else {
          end(true, "本关得分：" + currentLevelScore + "。全部船只安全抵达，今晚的海图被你守住了。");
        }
      }
      updateHud();
    }

    function end(win, text) {
      state = "ended";
      updatePauseHint();
      if (win) {
        const totalBest = Math.max(Number(localStorage.getItem("zfl26Best") || 0), score);
        saveBest(totalBest);
      }
      updateGlobalBest();
      show(win ? "守望成功" : "守望失败", text + " 最终得分：" + score, "重开", function() { level = 0; score = 0; resetLevel(); });
    }

    function show(title, text, button, action) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlayBtn.textContent = button;
      overlayBtn.onclick = action;
      overlay.classList.remove("hidden");
    }

    function updateHud() {
      levelText.textContent = (level + 1) + " / 3";
      scoreText.textContent = score;
      arrivedText.textContent = boats.filter(boat => boat.arrived).length + " / " + boats.length;
    }

    function draw() {
      const data = levels[level];
      ctx.clearRect(0, 0, 960, 600);
      const sea = ctx.createLinearGradient(0, 0, 960, 600);
      sea.addColorStop(0, "#08222f");
      sea.addColorStop(1, "#061017");
      ctx.fillStyle = sea;
      ctx.fillRect(0, 0, 960, 600);
      ctx.strokeStyle = "rgba(140,190,190,.12)";
      for (let x = 0; x < 960; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + 80, 600); ctx.stroke(); }
      for (const fog of data.fog) {
        const g = ctx.createRadialGradient(fog.x, fog.y, 10, fog.x, fog.y, fog.r);
        g.addColorStop(0, "rgba(180,190,180,.26)");
        g.addColorStop(1, "rgba(180,190,180,0)");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(fog.x, fog.y, fog.r, 0, Math.PI * 2); ctx.fill();
      }
      for (const rock of data.rocks) {
        ctx.fillStyle = "#273a3a";
        ctx.beginPath(); ctx.arc(rock.x, rock.y, rock.r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#516a62"; ctx.stroke();
      }
      ctx.save();
      ctx.translate(lighthouse.x, lighthouse.y);
      ctx.rotate(beamAngle);
      ctx.fillStyle = "rgba(247,220,125,.24)";
      ctx.beginPath();
      const w = beamWide ? 0.42 : 0.22;
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, 780, -w, w);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = "#e7c46a";
      ctx.beginPath(); ctx.arc(lighthouse.x, lighthouse.y, 18, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#87d4e5";
      ctx.fillRect(900, 70, 28, 460);
      for (const boat of boats) {
        ctx.save();
        ctx.translate(boat.x, boat.y);
        ctx.fillStyle = boat.arrived ? "#7dd69b" : inBeam(boat) ? "#f5e7a2" : "#c7d7d7";
        ctx.beginPath(); ctx.moveTo(14, 0); ctx.lineTo(-10, -8); ctx.lineTo(-6, 8); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#e2685d"; ctx.fillRect(-18, -18, 36 * (boat.lit / 4), 4);
        ctx.restore();
      }
      if (state === "paused") {
        ctx.fillStyle = "rgba(0,0,0,.45)";
        ctx.fillRect(0,0,960,600);
        ctx.fillStyle = "#fff";
        ctx.font = "34px Arial";
        ctx.fillText("已暂停", 420, 300);
      }
    }

    function loop(ts) {
      const dt = Math.min(0.033, (ts - last) / 1000 || 0);
      last = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    function togglePause() {
      if (state === "playing") {
        gameSettings = loadSettings();
        applySettings();
        state = "paused";
        updatePauseHint();
      } else if (state === "paused") {
        gameSettings = loadSettings();
        applySettings();
        state = "playing";
        updatePauseHint();
      }
    }
    window.addEventListener("keydown", event => {
      SoundManager.unlock();
      const settingsOpen = !settingsOverlay.classList.contains("hidden");
      if (event.key === "Escape") {
        if (settingsOpen) {
          closeGameSettings();
        }
        return;
      }
      if (settingsOpen) return;
      keys[event.key] = true;
      if (event.key === " ") {
        beamWide = !beamWide;
        SoundManager.toggleBeam();
      }
      if (event.key.toLowerCase() === "p") togglePause();
      if (event.key.toLowerCase() === "r") resetLevel();
    });
    window.addEventListener("keyup", event => keys[event.key] = false);

    ["click", "touchstart", "pointerdown"].forEach(function(evt) {
      document.addEventListener(evt, function() { SoundManager.unlock(); }, { once: false, passive: true });
    });
    updateGlobalBest();
    startBtn.onclick = function() { level = 0; score = 0; resetLevel(); };
    levelSelectBtn.onclick = showLevelSelect;
    backToMenuBtn.onclick = showMainMenu;
    pauseBtn.onclick = togglePause;
    settingsBtn.onclick = showSettings;
    backFromSettingsBtn.onclick = hideSettings;
    soundToggle.onclick = function() {
      gameSettings.sound = !gameSettings.sound;
      saveSettings();
      applySettings();
    };
    brightnessRange.oninput = function() {
      gameSettings.brightness = Number(brightnessRange.value);
      saveSettings();
      applySettings();
    };
    sensitivityRange.oninput = function() {
      gameSettings.sensitivity = Number(sensitivityRange.value) / 10;
      saveSettings();
      applySettings();
    };
    pauseHintToggle.onclick = function() {
      gameSettings.pauseHint = !gameSettings.pauseHint;
      saveSettings();
      applySettings();
    };
    gameSettingsBtn.onclick = openGameSettings;
    closeSettingsBtn.onclick = closeGameSettings;
    modalSoundToggle.onclick = function() {
      gameSettings.sound = !gameSettings.sound;
      saveSettings();
      applySettings();
    };
    modalBrightnessRange.oninput = function() {
      gameSettings.brightness = Number(modalBrightnessRange.value);
      saveSettings();
      applySettings();
    };
    modalSensitivityRange.oninput = function() {
      gameSettings.sensitivity = Number(modalSensitivityRange.value) / 10;
      saveSettings();
      applySettings();
    };
    modalPauseHintToggle.onclick = function() {
      gameSettings.pauseHint = !gameSettings.pauseHint;
      saveSettings();
      applySettings();
    };
    settingsOverlay.addEventListener("click", function(e) {
      if (e.target === settingsOverlay) {
        closeGameSettings();
      }
    });
    overlayBtn.onclick = function() { level = 0; score = 0; resetLevel(); };
    applySettings();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
